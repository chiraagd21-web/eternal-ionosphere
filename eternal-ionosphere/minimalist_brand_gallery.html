<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternal Ionosphere | Minimalist Logo Gallery</title>
    <style>
        :root {
            --bg: #FCFAF6;
            --text: #091717;
            --accent: #20808D;
            --border: #E8E8E3;
            --card-bg: #F3F3EE;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #091717;
                --text: #FCFAF6;
                --accent: #20808D;
                --border: #1a2a2a;
                --card-bg: #0d1e1e;
            }
        }
        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 80px 40px;
            text-align: center;
        }
        h1 { font-weight: 900; letter-spacing: -0.05em; font-size: 3rem; margin-bottom: 20px; }
        p { color: var(--accent); font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; font-size: 0.7rem; margin-bottom: 80px; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            cursor: pointer;
        }
        .card:hover { 
            transform: translateY(-10px); 
            border-color: var(--accent);
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.1);
        }
        .card svg { 
            width: 120px; 
            height: 120px; 
            fill: none; 
            stroke: var(--text); 
            stroke-width: 2.5; 
            stroke-linecap: round; 
            stroke-linejoin: round;
            margin-bottom: 40px;
            transition: all 0.5s;
        }
        .card:hover svg { stroke: var(--accent); stroke-width: 3.5; transform: scale(1.1); }
        .label { 
            font-size: 0.6rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 0.2em; 
            opacity: 0.3; 
        }
        .number {
            position: absolute;
            top: 30px;
            left: 30px;
            font-size: 0.8rem;
            font-weight: 900;
            opacity: 0.1;
        }
    </style>
</head>
<body>

    <h1>Unicorn Minimalist Identities</h1>
    <p>Eternal Ionosphere | Brand Catalog 2026</p>

    <div class="grid">
        
        <!-- 01. Double Ring -->
        <div class="card">
            <div class="number">01</div>
            <svg viewBox="0 0 100 100">
                <circle cx="40" cy="50" r="30" />
                <circle cx="60" cy="50" r="30" />
            </svg>
            <div class="label">Ion Vortex</div>
        </div>

        <!-- 02. Lighting Dot -->
        <div class="card">
            <div class="number">02</div>
            <svg viewBox="0 0 100 100">
                <path d="M50 20 A30 30 0 1 1 45 20 L55 10 Z" />
                <circle cx="50" cy="50" r="1" />
            </svg>
            <div class="label">Direct Node</div>
        </div>

        <!-- 03. Signal E -->
        <div class="card">
            <div class="number">03</div>
            <svg viewBox="0 0 100 100">
                <path d="M25 35 H75 M25 50 H65 M25 65 H75" />
                <path d="M25 35 V65" />
            </svg>
            <div class="label">Signal Expansion</div>
        </div>

        <!-- 04. The Arc -->
        <div class="card">
            <div class="number">04</div>
            <svg viewBox="0 0 100 100">
                <path d="M20 70 Q50 30 80 70" />
                <circle cx="50" cy="45" r="3" fill="#20808D" stroke="none" />
            </svg>
            <div class="label">Stratos Horizon</div>
        </div>

        <!-- 05. Mono Bolt -->
        <div class="card">
            <div class="number">05</div>
            <svg viewBox="0 0 100 100">
                <path d="M60 20 L40 50 H60 L40 80" />
            </svg>
            <div class="label">Ion Strike</div>
        </div>

        <!-- 06. Parallel Pillars -->
        <div class="card">
            <div class="number">06</div>
            <svg viewBox="0 0 100 100">
                <rect x="35" y="30" width="5" height="40" rx="2.5" />
                <rect x="60" y="30" width="5" height="40" rx="2.5" />
                <line x1="40" y1="50" x2="60" y2="50" stroke-dasharray="4 4" opacity="0.4" />
            </svg>
            <div class="label">Neural Gate</div>
        </div>

        <!-- 07. Geometric Globe -->
        <div class="card">
            <div class="number">07</div>
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="35" />
                <path d="M15 50 H85 M50 15 Q30 50 50 85 Q70 50 50 15" />
            </svg>
            <div class="label">Global Mesh</div>
        </div>

        <!-- 08. Core I -->
        <div class="card">
            <div class="number">08</div>
            <svg viewBox="0 0 100 100">
                <rect x="35" y="25" width="30" height="50" rx="15" />
                <circle cx="50" cy="50" r="6" stroke="#20808D" />
            </svg>
            <div class="label">Neural Core</div>
        </div>

        <!-- 09. Node Link -->
        <div class="card">
            <div class="number">09</div>
            <svg viewBox="0 0 100 100">
                <circle cx="30" cy="30" r="4" fill="currentColor" stroke="none" />
                <circle cx="70" cy="30" r="4" fill="currentColor" stroke="none" />
                <circle cx="50" cy="70" r="4" fill="currentColor" stroke="none" />
                <path d="M30 30 L50 70 L70 30" />
            </svg>
            <div class="label">Logic Anchor</div>
        </div>

        <!-- 10. Forward E -->
        <div class="card">
            <div class="number">10</div>
            <svg viewBox="0 0 100 100">
                <path d="M30 35 L70 35 M30 50 L60 50 M30 65 L70 65" />
                <path d="M40 35 L40 65" transform="skewX(-10, 50, 50)" />
            </svg>
            <div class="label">Velocity Hub</div>
        </div>

    </div>

</body>
</html>
